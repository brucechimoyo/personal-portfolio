# CI/CD Pipeline for Kamatera Deployment
# This pipeline builds, tests, and deploys your portfolio to Kamatera

name: Deploy to Kamatera

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - '**/js/**'
      - '**/css/**'
      - 'Dockerfile'
      - 'nginx.conf'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: portfolio-app
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build . --file Dockerfile --tag portfolio-app
      
      - name: Run basic tests
        run: |
          # Check if nginx config is valid
          docker run --rm -v $(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf:ro nginx:alpine nginx -t
          
          # Check if Dockerfile builds successfully
          docker run --rm portfolio-app nginx -v
      
      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: portfolio-app
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-to-kamatera:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to Kamatera Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.KAMATERA_SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /opt/portfolio
            
            # Pull latest changes
            git pull origin main || true
            
            # Rebuild and restart container
            docker build -t portfolio-app .
            docker stop portfolio-app || true
            docker rm portfolio-app || true
            docker run -d \
              --name portfolio-app \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              portfolio-app
            
            # Clean up old images
            docker image prune -f
      
      - name: Verify Deployment
        run: |
          sleep 10
          curl -f http://${{ secrets.KAMATERA_SERVER_IP }} || exit 1
          echo "Deployment successful!"
      
      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "Portfolio deployed to Kamatera",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Deployment *${{ job.status }}* for ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-with-ssl:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy with SSL to Kamatera
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.KAMATERA_SERVER_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOMAIN
          script: |
            cd /opt/portfolio
            
            # Update nginx config with SSL
            cp nginx.production.conf /etc/nginx/sites-available/portfolio
            ln -sf /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/portfolio
            
            # Rebuild with SSL support
            docker compose -f docker-compose.yml --env-file .env.prod up -d --build
            
            # Obtain SSL certificate if not present
            if [ ! -f /etc/letsencrypt/live/$DOMAIN/fullchain.pem ]; then
              docker run -it --rm \
                -v certbot-conf:/etc/letsencrypt \
                -v certbot-www:/var/www/certbot \
                certbot/certbot certonly \
                --webroot \
                --webroot-path=/var/www/certbot \
                -d $DOMAIN -d www.$DOMAIN
            fi
            
            # Reload nginx
            docker exec portfolio-app nginx -s reload
      
      - name: Verify SSL
        run: |
          sleep 10
          curl -f https://${{ secrets.DOMAIN }} || exit 1
          echo "SSL deployment successful!"
