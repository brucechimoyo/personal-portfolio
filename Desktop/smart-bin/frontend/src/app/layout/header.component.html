<header class="navbar navbar-dark bg-primary-custom fixed-top shadow-sm" style="height: 64px;">
  <div class="container-fluid">
    <div class="d-flex align-items-center">
      <!-- Sidebar Toggle for Mobile -->
      <button 
        class="btn btn-link text-white d-md-none me-2"
        (click)="toggleSidebar()"
        aria-label="Toggle sidebar">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      
      <!-- Sidebar Toggle for Desktop -->
      <button 
        class="btn btn-link text-white d-none d-md-block me-2"
        (click)="toggleSidebar()"
        aria-label="Toggle sidebar">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      
      <svg class="me-2" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/>
      </svg>
      <span class="navbar-brand mb-0 h1 fw-bold">Smart Bin Admin Dashboard</span>
    </div>
    <div class="ms-auto">
      <!-- Placeholder for user actions, notifications, etc. -->
    </div>
  </div>
</header>
