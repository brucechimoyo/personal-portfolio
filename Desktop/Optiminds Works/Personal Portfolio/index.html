<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bruce Takura Chimoyo - Full-stack developer and frontend architect. Building performant, accessible web experiences.">
  <meta name="theme-color" content="#1a1a1a">
  <title>Bruce Takura Chimoyo - Developer Portfolio</title>

  <!-- Google Fonts - Poppins & JetBrains Mono for CLI theme -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Critical CSS inlined for fast FCP -->
  <style>
    :root {
      /* Light mode colors */
      --color-bg: #ffffff;
      --color-bg-secondary: #f7f7f7;
      --color-border: #eeeeee;
      --color-text-primary: #0f1419;
      --color-text-secondary: #536471;
      --color-text-tertiary: #8899a6;
      --color-accent: #1d9bf0;
      --color-accent-hover: #1a8cd8;
      --color-success: #17bf63;
      --color-warning: #ffb817;
      --color-danger: #f91880;

      /* Typography */
      --font-family-primary: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-family-mono: "Menlo", "Monaco", "Courier New", monospace;
      --font-size-xs: clamp(0.606rem, 1vw, 0.75rem);
      --font-size-sm: clamp(0.728rem, 1.25vw, 0.875rem);
      --font-size-base: clamp(0.849rem, 1.5vw, 1rem);
      --font-size-lg: clamp(0.97rem, 1.75vw, 1.125rem);
      --font-size-xl: clamp(1.091rem, 2vw, 1.25rem);
      --font-size-2xl: clamp(1.213rem, 2.5vw, 1.5rem);
      --font-size-3xl: clamp(1.455rem, 3vw, 2rem);
      --line-height-tight: 1.25;
      --line-height-normal: 1.5;
      --line-height-relaxed: 1.75;

      /* Spacing */
      --spacing-xs: 0.25rem;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;
      --spacing-2xl: 3rem;

      /* Transitions */
      --transition-fast: 150ms ease-in-out;
      --transition-base: 200ms ease-in-out;
      --transition-slow: 300ms ease-in-out;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);

      /* Z-index */
      --z-dropdown: 100;
      --z-modal: 1000;

      /* Breakpoints (mobile-first) */
      --breakpoint-sm: 30rem; /* 480px */
      --breakpoint-md: 48rem; /* 768px */
      --breakpoint-lg: 64rem; /* 1024px */
      --breakpoint-xl: 80rem; /* 1280px */
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #000000;
        --color-bg-secondary: #16181c;
        --color-border: #2f3336;
        --color-text-primary: #efefef;
        --color-text-secondary: #b7bbbe;
        --color-text-tertiary: #71767b;
      }
    }

    html[data-theme="dark"] {
      --color-bg: #000000;
      --color-bg-secondary: #16181c;
      --color-border: #2f3336;
      --color-text-primary: #efefef;
      --color-text-secondary: #b7bbbe;
      --color-text-tertiary: #71767b;
    }

    html[data-theme="light"] {
      --color-bg: #ffffff;
      --color-bg-secondary: #f7f7f7;
      --color-border: #eeeeee;
      --color-text-primary: #0f1419;
      --color-text-secondary: #536471;
      --color-text-tertiary: #5a6c7d;
    }



    /* CSS Reset & Base Styles */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-family-primary);
      font-size: var(--font-size-base);
      line-height: var(--line-height-normal);
      color: var(--color-text-primary);
      background-color: var(--color-bg);
      transition: background-color var(--transition-base), color var(--transition-base);
      overflow-x: hidden;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      line-height: var(--line-height-tight);
      margin-bottom: var(--spacing-md);
    }

    h1 { font-size: var(--font-size-3xl); }
    h2 { font-size: var(--font-size-2xl); }
    h3 { font-size: var(--font-size-xl); }
    h4 { font-size: var(--font-size-lg); }
    h5, h6 { font-size: var(--font-size-base); }

    p {
      margin-bottom: var(--spacing-md);
    }

    a {
      color: var(--color-accent);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    a:hover {
      color: var(--color-accent-hover);
      text-decoration: underline;
    }

    a:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    button, [role="button"] {
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: all var(--transition-fast);
    }

    button:focus-visible, [role="button"]:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Main Layout */
    body {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    /* Mobile-first layout (no sidebar on mobile) */
    @media (min-width: 48rem) {
      body {
        grid-template-columns: 250px 1fr;
        grid-template-rows: 1fr;
      }
    }

    @media (min-width: 64rem) {
      body {
        grid-template-columns: 250px 1fr 300px;
      }
    }

    @media (min-width: 80rem) {
      body {
        grid-template-columns: 275px 1fr 350px;
      }
    }

    header {
      grid-column: 1 / -1;
      border-bottom: 1px solid var(--color-border);
      padding: var(--spacing-md);
      background-color: var(--color-bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    @media (min-width: 48rem) {
      header {
        display: none;
      }
    }

    nav#sidebar {
      display: none;
    }

    @media (min-width: 48rem) {
      nav#sidebar {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--color-border);
        padding: var(--spacing-xl) var(--spacing-lg);
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        background-color: var(--color-bg);
      }
    }

    main#feed {
      grid-column: 1;
      border-right: 1px solid var(--color-border);
      min-height: 100vh;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    @media (min-width: 48rem) {
      main#feed {
        grid-column: 2;
      }
    }

    @media (min-width: 64rem) {
      main#feed {
        grid-column: 2;
        border-right: 1px solid var(--color-border);
      }
    }

    aside#rightbar {
      display: none;
    }

    @media (min-width: 64rem) {
      aside#rightbar {
        display: block;
        padding: var(--spacing-xl) var(--spacing-lg);
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        background-color: var(--color-bg);
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--color-border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--color-text-tertiary);
    }
  </style>

  <!-- Non-critical CSS will be loaded separately -->
  <link rel="stylesheet" href="css/global.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/components.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/accessibility.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/experience-detail.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/responsive.css" media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/accessibility.css">
    <link rel="stylesheet" href="css/experience-detail.css">
    <link rel="stylesheet" href="css/responsive.css">
  </noscript>

  <script>
    // Prevent theme flash by setting theme before render
    (function() {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>


</head>
<body>
  <!-- Mobile Header -->
  <header role="banner" class="mobile-header">
    <div class="mobile-header-content">
      <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
      <h1 class="logo">BTC</h1>
      <div class="mobile-toggles">
        <button id="theme-toggle-mobile" class="theme-toggle" aria-label="Toggle theme">
          <span class="icon-sun" aria-hidden="true">☀️</span>
          <span class="icon-moon" aria-hidden="true">🌙</span>
        </button>
        <button id="color-toggle-mobile" class="color-toggle-mobile" aria-label="Toggle accent color" aria-haspopup="listbox" aria-expanded="false">
          <span class="icon-palette" aria-hidden="true">🎨</span>
          <span class="color-indicator" id="color-indicator-mobile"></span>
        </button>
        <div id="color-menu-mobile" class="color-menu" role="listbox" aria-label="Color theme options" hidden>
          <button class="color-option" data-color="blue" role="option" aria-label="Blue accent">🔵 Blue</button>
          <button class="color-option" data-color="orange" role="option" aria-label="Orange accent">🟠 Orange</button>
          <button class="color-option" data-color="green" role="option" aria-label="Green accent">🟢 Green</button>
          <button class="color-option" data-color="red" role="option" aria-label="Red accent">🔴 Red</button>
          <button class="color-option" data-color="purple" role="option" aria-label="Purple accent">🟣 Purple</button>
        </div>
      </div>
    </div>
    <ul class="mobile-menu" id="mobile-menu" role="navigation" aria-label="Mobile navigation">
      <li><a href="#home" class="mobile-nav-item">Home</a></li>
      <li><a href="#projects" class="mobile-nav-item">Projects</a></li>
      <li><a href="#articles" class="mobile-nav-item">Articles</a></li>
    </ul>
  </header>

  <!-- Left Sidebar Navigation -->
  <nav id="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar-header">
      <h1 class="logo">BTC</h1>
    </div>
    <ul class="nav-list" role="navigation" aria-label="Main navigation">
      <li><a href="#home" class="nav-item active">Home</a></li>
      <li><a href="#projects" class="nav-item">Projects</a></li>
      <li><a href="#articles" class="nav-item">Articles</a></li>
    </ul>
    <div class="sidebar-toggles">
      <button id="theme-toggle" class="theme-toggle-desktop" aria-label="Toggle theme">
        <span class="icon-sun" aria-hidden="true">☀️</span>
        <span class="icon-moon" aria-hidden="true">🌙</span>
      </button>
      <button id="color-toggle" class="color-toggle-desktop" aria-label="Toggle accent color" aria-haspopup="listbox" aria-expanded="false">
        <span class="icon-palette" aria-hidden="true">🎨</span>
        <span class="color-indicator" id="color-indicator"></span>
      </button>
      <div id="color-menu" class="color-menu" role="listbox" aria-label="Color theme options" hidden>
        <button class="color-option" data-color="blue" role="option" aria-label="Blue accent">🔵 Blue</button>
        <button class="color-option" data-color="orange" role="option" aria-label="Orange accent">🟠 Orange</button>
        <button class="color-option" data-color="green" role="option" aria-label="Green accent">🟢 Green</button>
        <button class="color-option" data-color="red" role="option" aria-label="Red accent">🔴 Red</button>
        <button class="color-option" data-color="purple" role="option" aria-label="Purple accent">🟣 Purple</button>
      </div>
    </div>
  </nav>

  <!-- Main Feed -->
  <main id="feed" role="main">
    <!-- Profile Header inserted here -->
    <article id="profile-header" style="display: block;"></article>
    <!-- Feed items inserted here -->
    <div id="feed-container"></div>
  </main>

  <!-- Right Sidebar -->
  <aside id="rightbar" role="complementary" aria-label="Sidebar">
    <div id="rightbar-content"></div>
  </aside>

  <!-- Router outlet for pages -->
  <div id="router-outlet" style="display: none;"></div>

  <!-- Support Chat Widget -->
  <div id="support-chat" class="support-chat" style="display: none;">
    <div class="support-header">
      <h3>Support Chat</h3>
      <button id="support-close" class="support-close" aria-label="Close support chat">×</button>
    </div>
    <div class="support-body">
      <p>How can we help you today?</p>
      <form id="support-form" class="support-form">
        <label for="support-name" class="sr-only">Your name</label>
        <input type="text" id="support-name" placeholder="Your name" required aria-label="Your name">
        <label for="support-message" class="sr-only">Your message</label>
        <textarea id="support-message" placeholder="Your message" required aria-label="Your message"></textarea>
        <button type="submit" class="btn">Send Message</button>
      </form>
      <div id="support-thanks" class="support-thanks hidden">
        <p>Thank you for your message! We'll get back to you soon.</p>
      </div>
    </div>
  </div>

   <!-- Defer non-critical JS -->
   <script type="module" src="js/main.js" defer></script>
</body>
</html>
