<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
          <!-- Header -->
          <div class="card-header bg-primary-custom text-white text-center py-4">
            <h2 class="mb-0 fw-bold">Smart Bin Management</h2>
          </div>
          
          <!-- Form -->
          <div class="card-body p-4">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label for="username" class="form-label fw-medium">
                  Username
                </label>
                <input 
                  id="username" 
                  type="text" 
                  formControlName="username" 
                  autocomplete="username" 
                  required 
                  placeholder="Enter your username"
                  class="form-control">
                <div 
                  *ngIf="loginForm.get('username')?.hasError('required') && loginForm.get('username')?.touched" 
                  class="form-text text-danger">
                  Username is required
                </div>
              </div>
              
              <div class="mb-4">
                <label for="password" class="form-label fw-medium">
                  Password
                </label>
                <input 
                  id="password" 
                  type="password" 
                  formControlName="password" 
                  autocomplete="current-password" 
                  required 
                  placeholder="Enter your password"
                  class="form-control">
                <div 
                  *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched" 
                  class="form-text text-danger">
                  Password is required
                </div>
              </div>
              
              <button 
                type="submit" 
                [disabled]="loginForm.invalid || loading"
                class="btn btn-primary-custom w-100 d-flex align-items-center justify-content-center">
                <div *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
                {{ loading ? 'Signing in...' : 'Sign in' }}
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
