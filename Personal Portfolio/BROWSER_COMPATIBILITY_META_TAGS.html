<!-- Add these meta tags to your index.html <head> for better browser compatibility -->

<!-- Charset and viewport (already present, keep as is) -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- Apple specific -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTC Portfolio">

<!-- Microsoft specific -->
<meta name="msapplication-TileColor" content="#1a1a1a">
<meta name="msapplication-config" content="/browserconfig.xml">

<!-- Android specific -->
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

<!-- Compatibility mode for older IE -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- Format detection -->
<meta name="format-detection" content="telephone=no">
<meta name="format-detection" content="email=no">

<!-- Prefers reduced motion for accessibility -->
