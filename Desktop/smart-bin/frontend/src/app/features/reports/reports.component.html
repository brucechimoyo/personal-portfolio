<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold text-primary">Reports</h2>
      <div class="text-muted">View and manage all system reports</div>
    </div>
    <button class="btn btn-primary d-flex align-items-center gap-2" (click)="openAdd()" title="Add Report">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="11" fill="#7c3aed"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v8m-4-4h8"/>
      </svg>
      Add Report
    </button>
  </div>
  <div class="table-responsive mb-3">
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Date</th>
          <th>Status</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let report of reports">
          <td>{{ report.id }}</td>
          <td>{{ report.title }}</td>
          <td>{{ report.date }}</td>
          <td>
            <span class="badge" [class.bg-secondary]="report.status === 'Draft'" [class.bg-success]="report.status === 'Finalized'">{{ report.status }}</span>
          </td>
          <td>{{ report.description || 'No description provided.' }}</td>
          <td>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-primary" (click)="openEdit(report)" title="Edit">
                <svg width="16" height="16" fill="none" stroke="#7c3aed" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6-6 3 3-6 6H9v-3z"/></svg>
              </button>
              <button class="btn btn-outline-info" (click)="viewReport(report)" title="View">
                <i class="bi bi-eye"></i>
              </button>
              <button class="btn btn-outline-danger" (click)="deleteReport(report)" title="Delete">
                <svg width="16" height="16" fill="none" stroke="#e11d48" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zm2-12V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Bootstrap Modal -->
  <div class="modal fade show d-block" tabindex="-1" *ngIf="showModal" style="background:rgba(0,0,0,0.3);">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ editMode ? 'Edit Report' : 'Add Report' }}</h5>
          <button type="button" class="btn-close" aria-label="Close" (click)="closeModal()"></button>
        </div>
        <form (ngSubmit)="saveReport()" #reportForm="ngForm">
          <div class="modal-body">
            <div class="mb-3">
              <label for="reportTitle" class="form-label">Title</label>
              <input id="reportTitle" name="title" [(ngModel)]="modalReport.title" required class="form-control" />
            </div>
            <div class="mb-3">
              <label for="reportDate" class="form-label">Date</label>
              <input id="reportDate" name="date" type="date" [(ngModel)]="modalReport.date" required class="form-control" />
            </div>
            <div class="mb-3">
              <label for="reportStatus" class="form-label">Status</label>
              <select id="reportStatus" name="status" [(ngModel)]="modalReport.status" class="form-select">
                <option value="Draft">Draft</option>
                <option value="Finalized">Finalized</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="reportDescription" class="form-label">Description</label>
              <textarea id="reportDescription" name="description" [(ngModel)]="modalReport.description" rows="2" placeholder="Short description" class="form-control"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <app-confirmation-modal
    *ngIf="showConfirmModal"
    [message]="'Are you sure you want to delete this report?'"
    (confirmed)="confirmDeleteReport()"
    (cancelled)="cancelDeleteReport()">
  </app-confirmation-modal>
</div>
